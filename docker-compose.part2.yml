version: '3.8'

services:
  # ── MongoDB Service (Part II) ───────────────────────────────────────────────
  mongo-ci:
    image: mongo:7
    container_name: nextamplify-ci-mongo
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_ci_data:/data/db
    networks:
      - nextamplify-ci-network

  # ── Next.js Application (Part II - Volume Mount) ───────────────────────────
  app-ci:
    image: node:18-alpine
    container_name: nextamplify-ci-app
    working_dir: /app
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - MONGODB_URI=mongodb://mongo-ci:27017/amplifyDB
      - JWT_SECRET=${JWT_SECRET:-amplify_super_secret_key_2026_nextjs}
      - PORT=8081
    command: sh -c "npm install && npm run build && npm start -- -p 8081"
    depends_on:
      - mongo-ci
    networks:
      - nextamplify-ci-network

volumes:
  mongo_ci_data:
    driver: local

networks:
  nextamplify-ci-network:
    driver: bridge
